name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Classic Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.classic.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: jolocdj   
          template: classic
          base: header, activity, community, repositories, metadata

      - name: Generate Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.full-year.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: YOUR_USERNAME
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Commit files
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          git add metrics.classic.svg metrics.plugin.isocalendar.full-year.svg
          git diff --staged --quiet || git commit -m "Update metrics"
          git push
